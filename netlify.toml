## Netlify configuration for Chofetz Chaim Shmiras HaLashon App
## The static frontend lives in /public and the backend bot routes are
## served as serverless Netlify Functions under /netlify/functions.

[build]
  ## Nothing to build — the frontend is already plain HTML/JS/CSS in /public.
  ## Netlify still needs a build command so TypeScript functions get bundled.
  command = "echo 'No build step required for static assets.'"
  ## Skip automatic Git builds when a commit only changes docs, rules, or other
  ## files that do not affect the deployed Netlify site.
  ignore = "bash scripts/netlify-ignore.sh"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  ## Bundle TypeScript functions with esbuild (default) and include shared code.
  node_bundler = "esbuild"
  ## Include the shared bot service so esbuild can follow the import.
  included_files = ["src/services/**", "src/routes/**"]

## Route the existing /api/* paths (used by public/app.js) to Netlify Functions.
## Each endpoint maps to its own function file in netlify/functions/.
[[redirects]]
  from = "/api/chofetz-chaim/chat"
  to = "/.netlify/functions/chofetz-chaim-chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/chofetz-chaim/daily-encouragement"
  to = "/.netlify/functions/chofetz-chaim-daily-encouragement"
  status = 200
  force = true

[[redirects]]
  from = "/api/chofetz-chaim/speech-lab"
  to = "/.netlify/functions/chofetz-chaim-speech-lab"
  status = 200
  force = true

## SPA-style fallback: unknown paths return index.html so deep links work.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

## Sensible cache headers for assets. Versioned JS/CSS (?v=...) already
## bust caches on their own, but we add long max-age for images/fonts
## and no-cache for HTML so updates roll out instantly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
