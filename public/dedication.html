<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Dedication — Chofetz Chaim Shmiras HaLashon</title>
    <link rel="stylesheet" href="/styles.css?v=4.0">
</head>
<body class="dedication-page">
    <div class="dedication-page-inner">
        <div class="dedication-page-top">
            <a href="/index.html" class="dedication-back-link" data-i18n="backToApp">Back to app</a>
            <button type="button" id="languageToggleDedication" class="lang-btn">עברית</button>
        </div>

        <header>
            <h1 data-i18n="dedicationPageTitle">Dedication</h1>
            <p class="subtitle" data-i18n="subtitle">Your guide to Shmiras HaLashon</p>
        </header>

        <div class="dedication-body">
            <p data-i18n="dedication"></p>
        </div>
    </div>

    <script type="module">
        import { switchLanguage, updateUILanguage, currentLanguage } from '/translations.js';

        document.addEventListener('DOMContentLoaded', () => {
            updateUILanguage();
            document.getElementById('languageToggleDedication').addEventListener('click', () => {
                switchLanguage(currentLanguage === 'en' ? 'he' : 'en');
            });
        });
    </script>
</body>
</html>
